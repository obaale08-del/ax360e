name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y glslang-tools

      - name: Fix Python build script
        run: |
          FILE="app/src/main/cpp/xenia-canary/tools/build/compile_shader_spirv.py"
          # Fix encoding issue
          sed -i 's/sys.stderr.write(result.stderr)/sys.stderr.write(result.stderr.decode("utf-8"))/' $FILE
          # Remove unsupported flag
          sed -i 's/--canonicalize-ids//g' $FILE

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
